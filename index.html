<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뽑기게임</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.08), transparent 16%),
        radial-gradient(circle at 15% 50%, rgba(255,255,255,0.03), transparent 20%),
        radial-gradient(circle at 85% 50%, rgba(255,255,255,0.03), transparent 20%),
        #000;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      gap: 16px;
      padding: 16px;
      background: transparent;
    }

    .panel {
      background: rgba(140, 140, 140, 0.18);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 24px rgba(255,255,255,0.05);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      border-radius: 18px;
    }

    #leftPanel {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
    }

    #miniPanel {
      padding: 12px;
      height: 250px;
    }

    #miniTitle {
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 15px;
    }

    #miniMap {
      width: 100%;
      height: 195px;
      display: block;
      border-radius: 12px;
      background: #0b0b0b;
      border: 1px solid rgba(255,255,255,0.12);
    }

    #controlPanel {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .label {
      font-size: 13px;
      color: #d4d4d4;
      margin-bottom: 6px;
      font-weight: 700;
    }

    textarea, input {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 12px;
      font-size: 15px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    textarea {
      resize: none;
      height: 155px;
      line-height: 1.45;
    }

    input {
      height: 44px;
    }

    button {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 8px 18px rgba(0,0,0,0.28),
        0 0 18px rgba(255,255,255,0.05);
      transition: transform .08s ease, filter .12s ease;
    }

    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }

    #shuffleBtn {
      height: 58px;
      font-size: 28px;
    }

    #startBtn {
      height: 72px;
      font-size: 34px;
    }

    #hint {
      white-space: pre-line;
      font-size: 12px;
      color: #dcdcdc;
      line-height: 1.45;
      opacity: 0.92;
    }

    #rightWrap {
      flex: 1;
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.06), transparent 16%),
        #050505;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 0 30px rgba(255,255,255,0.04);
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }

    #rankBoard {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 220px;
      max-height: calc(100% - 32px);
      overflow: auto;
      padding: 14px;
      z-index: 20;
    }

    #rankBoardTitle {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    #rankText {
      line-height: 1.6;
      font-size: 17px;
      font-weight: 800;
    }

    #winnerBanner {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 20;
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: 0 0 24px rgba(255,255,255,0.10);
      font-size: 34px;
      font-weight: 900;
      opacity: 0;
      transition: opacity .2s ease;
      pointer-events: none;
    }

    #winnerBanner.show {
      opacity: 1;
    }

    #statusBar {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 10px 14px;
      z-index: 20;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      #app { padding: 10px; gap: 10px; }
      #leftPanel { width: 280px; }
      #winnerBanner { font-size: 24px; }
      #rankBoard { width: 180px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="leftPanel">
      <div id="miniPanel" class="panel">
        <div id="miniTitle">전체 맵</div>
        <canvas id="miniMap" width="296" height="195"></canvas>
      </div>

      <div id="controlPanel" class="panel">
        <div>
          <div class="label">이름 입력 (쉼표로 구분, 중복 가능)</div>
          <textarea id="namesInput">지,원,민수,지,은지,승호,수지,원,민수,하람,지우,지훈,은지,도윤,예린</textarea>
        </div>

        <div>
          <div class="label">몇 번째가 당첨인지</div>
          <input id="targetInput" type="number" min="1" value="10">
        </div>

        <button id="shuffleBtn">셔플</button>
        <button id="startBtn">시작</button>

        <div id="hint">시작 전엔 공이 공중에 떠 있음
시작하면 중력/관성/충돌/작용반작용 적용
카메라는 가장 앞선 공을 따라감
왼쪽 위 전체 맵에 현재 위치 표시</div>
      </div>
    </div>

    <div id="rightWrap">
      <canvas id="scene"></canvas>

      <div id="rankBoard" class="panel">
        <div id="rankBoardTitle">현재 순위</div>
        <div id="rankText">아직 시작 전</div>
      </div>

      <div id="winnerBanner"></div>
      <div id="statusBar" class="panel">대기 중</div>
    </div>
  </div>

  <script>
    (() => {
      if (!window.Matter) {
        alert("Matter.js 로드 실패. 인터넷 연결 상태를 확인해줘.");
        return;
      }

      const {
        Engine, World, Bodies, Body, Composite, Events
      } = Matter;

      const scene = document.getElementById("scene");
      const ctx = scene.getContext("2d");

      const miniMap = document.getElementById("miniMap");
      const miniCtx = miniMap.getContext("2d");

      const rightWrap = document.getElementById("rightWrap");
      const namesInput = document.getElementById("namesInput");
      const targetInput = document.getElementById("targetInput");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const startBtn = document.getElementById("startBtn");
      const rankText = document.getElementById("rankText");
      const winnerBanner = document.getElementById("winnerBanner");
      const statusBar = document.getElementById("statusBar");

      let viewW = 0;
      let viewH = 0;

      const engine = Engine.create();
      engine.gravity.x = 0;
      engine.gravity.y = 1.0;
      engine.gravity.scale = 0.0018;
      const world = engine.world;

      const WORLD_W = 2200;
      const WORLD_H = 11000;

      const camera = {
        x: WORLD_W / 2,
        y: 800,
        zoom: 0.12,
        targetZoom: 0.12
      };

      const walls = [];
      const pegs = [];
      const spinners = [];
      const sensors = [];
      let balls = [];
      let rankings = [];
      let shuffledNames = [];
      let started = false;
      let targetRank = 10;
      let winnerInfo = null;

      function resize() {
        const rect = rightWrap.getBoundingClientRect();
        viewW = Math.max(100, Math.floor(rect.width));
        viewH = Math.max(100, Math.floor(rect.height));
        scene.width = viewW;
        scene.height = viewH;
      }
      window.addEventListener("resize", resize);
      resize();

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, ch => ({
          "&":"&amp;",
          "<":"&lt;",
          ">":"&gt;",
          "\"":"&quot;",
          "'":"&#39;"
        }[ch]));
      }

      function parseNames() {
        return namesInput.value
          .split(",")
          .map(v => v.trim())
          .filter(Boolean);
      }

      function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function clearWorld() {
        const all = Composite.allBodies(world);
        for (const body of all) {
          World.remove(world, body);
        }
        walls.length = 0;
        pegs.length = 0;
        spinners.length = 0;
        sensors.length = 0;
        balls = [];
        rankings = [];
        started = false;
        winnerInfo = null;
        rankText.innerHTML = "아직 시작 전";
        winnerBanner.textContent = "";
        winnerBanner.classList.remove("show");
        statusBar.textContent = "대기 중";
      }

      function addWall(x1, y1, x2, y2, thickness = 24, extra = {}) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx);

        const body = Bodies.rectangle((x1+x2)/2, (y1+y2)/2, len, thickness, {
          isStatic: true,
          restitution: 0.18,
          friction: 0.15,
          renderKind: "wall",
          chamfer: { radius: Math.min(10, thickness / 2) },
          ...extra
        });

        Body.setAngle(body, angle);
        body._p1 = { x: x1, y: y1 };
        body._p2 = { x: x2, y: y2 };
        walls.push(body);
        World.add(world, body);
        return body;
      }

      function addPeg(x, y, r = 18) {
        const body = Bodies.circle(x, y, r, {
          isStatic: true,
          restitution: 0.86,
          friction: 0.01,
          renderKind: "peg"
        });
        pegs.push(body);
        World.add(world, body);
        return body;
      }

      function addSpinner(x, y, length, thickness, speed) {
        const body = Bodies.rectangle(x, y, length, thickness, {
          isStatic: true,
          restitution: 0.75,
          friction: 0.02,
          renderKind: "spinner"
        });
        body.spinSpeed = speed;
        spinners.push(body);
        World.add(world, body);
        return body;
      }

      function addSensor(x, y, w, h, label) {
        const body = Bodies.rectangle(x, y, w, h, {
          isStatic: true,
          isSensor: true,
          renderKind: "sensor"
        });
        body.sensorLabel = label;
        sensors.push(body);
        World.add(world, body);
        return body;
      }

      function buildMap() {
        clearWorld();

        addWall(220, 120, 220, WORLD_H - 220, 34);
        addWall(WORLD_W - 220, 120, WORLD_W - 220, WORLD_H - 220, 34);
        addWall(220, 120, WORLD_W - 220, 120, 34);

        addWall(360, 480, 820, 680, 18);
        addWall(930, 580, 1280, 580, 18);
        addWall(1370, 580, 1720, 580, 18);
        addWall(1820, 680, WORLD_W - 360, 480, 18);

        addWall(320, 1050, 960, 1220, 26);
        addWall(1240, 1220, 1880, 1050, 26);
        addWall(940, 1450, 620, 1820, 22);
        addWall(1260, 1450, 1580, 1820, 22);

        addWall(420, 2200, 900, 2520, 24);
        addWall(1780, 2200, 1300, 2520, 24);
        addWall(920, 2520, 1080, 2920, 18);
        addWall(1280, 2520, 1120, 2920, 18);

        addWall(280, 3250, 860, 3380, 24);
        addWall(1030, 3470, 1610, 3310, 24);
        addWall(1820, 3370, 1920, 3370, 24);

        addWall(340, 4100, 1020, 4340, 24);
        addWall(1850, 4140, 1160, 4480, 24);
        addWall(520, 4780, 1040, 5100, 22);
        addWall(1680, 4800, 1160, 5150, 22);

        addWall(330, 5650, 800, 5980, 22);
        addWall(1870, 5650, 1400, 5980, 22);
        addWall(820, 5980, 1100, 6400, 18);
        addWall(1380, 5980, 1100, 6400, 18);

        addWall(280, 6800, 980, 6950, 24);
        addWall(1240, 7070, 1920, 6880, 24);
        addWall(460, 7480, 900, 7860, 20);
        addWall(1760, 7480, 1320, 7860, 20);

        addWall(360, 8280, 980, 8460, 24);
        addWall(1820, 8360, 1200, 8560, 24);
        addWall(630, 8840, 1140, 9150, 20);
        addWall(1570, 8840, 1060, 9150, 20);

        addWall(300, 9600, 960, 9800, 24);
        addWall(1240, 9920, 1900, 9700, 24);
        addWall(870, 10180, 870, 10650, 16);
        addWall(1330, 10180, 1330, 10650, 16);

        addWall(860, 10680, 1090, 10960, 18);
        addWall(1340, 10680, 1110, 10960, 18);

        addSensor(1100, 10880, 220, 70, "finish");

        for (let y = 1200; y <= 10000; y += 420) {
          const cols = (y % 840 === 0) ? 8 : 7;
          const offset = (cols === 8) ? 0 : 90;
          for (let i = 0; i < cols; i++) {
            const x = 480 + i * 180 + offset;
            if (x > 320 && x < WORLD_W - 320) {
              addPeg(x, y, 16 + ((i + Math.floor(y/420)) % 3) * 2);
            }
          }
        }

        addSpinner(1100, 1780, 220, 16, 0.03);
        addSpinner(620, 3600, 220, 16, -0.028);
        addSpinner(1590, 3600, 220, 16, 0.028);
        addSpinner(1100, 5450, 260, 16, -0.03);
        addSpinner(1100, 7340, 240, 16, 0.03);
        addSpinner(730, 9380, 220, 16, -0.028);
        addSpinner(1470, 9380, 220, 16, 0.028);

        addWall(220, WORLD_H - 220, 980, WORLD_H - 220, 24, { renderKind: "hidden" });
        addWall(1220, WORLD_H - 220, WORLD_W - 220, WORLD_H - 220, 24, { renderKind: "hidden" });
      }

      function buildBalls(names) {
        const r = 38;
        const gap = 96;
        const totalWidth = (names.length - 1) * gap;
        const startX = WORLD_W / 2 - totalWidth / 2;
        const startY = 260;

        balls = names.map((name, i) => {
          const body = Bodies.circle(startX + i * gap, startY, r, {
            isStatic: true,
            restitution: 0.58,
            friction: 0.01,
            frictionAir: 0.0008,
            density: 0.0025,
            renderKind: "ball"
          });
          body.ballName = name;
          body.ballColor = ["#ffffff","#efefef","#dedede","#f6f6f6","#d0d0d0"][i % 5];
          body.finished = false;
          body.finishOrder = 0;
          World.add(world, body);
          return body;
        });
      }

      function rebuildGame(useCurrentShuffle) {
        targetRank = Math.max(1, parseInt(targetInput.value || "1", 10));
        const rawNames = parseNames().length ? parseNames() : ["이름없음"];

        if (!useCurrentShuffle || shuffledNames.length !== rawNames.length) {
          shuffledNames = [...rawNames];
        }

        buildMap();
        buildBalls(shuffledNames);

        camera.x = WORLD_W / 2;
        camera.y = 900;
        camera.zoom = 0.11;
        camera.targetZoom = 0.11;
      }

      function shuffleNames() {
        const raw = parseNames().length ? parseNames() : ["이름없음"];
        shuffledNames = shuffleArray(raw);
        rebuildGame(true);
        statusBar.textContent = "셔플 완료";
      }

      function startGame() {
        if (started) return;
        started = true;
        camera.targetZoom = 0.34;
        statusBar.textContent = "시작! 가장 앞선 공 추적 중";

        for (const b of balls) {
          Body.setStatic(b, false);
          Body.setVelocity(b, {
            x: (Math.random() - 0.5) * 0.8,
            y: 0.25 + Math.random() * 0.15
          });
          Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.035);
        }
      }

      shuffleBtn.addEventListener("click", shuffleNames);
      startBtn.addEventListener("click", startGame);

      namesInput.addEventListener("change", () => {
        shuffledNames = parseNames();
        rebuildGame(true);
      });

      targetInput.addEventListener("change", () => {
        targetRank = Math.max(1, parseInt(targetInput.value || "1", 10));
      });

      function updateRankBoard() {
        if (!rankings.length) {
          rankText.innerHTML = started ? "아직 통과한 공 없음" : "아직 시작 전";
          return;
        }
        rankText.innerHTML = rankings
          .slice(0, 15)
          .map((b, i) => `${i + 1}등: ${escapeHtml(b.ballName)}`)
          .join("<br>");
      }

      Events.on(engine, "collisionStart", event => {
        for (const pair of event.pairs) {
          checkFinish(pair.bodyA, pair.bodyB);
          checkFinish(pair.bodyB, pair.bodyA);
        }
      });

      function checkFinish(a, b) {
        if (!a.isSensor || a.sensorLabel !== "finish") return;
        if (!b.ballName || b.finished) return;

        b.finished = true;
        rankings.push(b);
        b.finishOrder = rankings.length;
        Body.setVelocity(b, { x: 0, y: Math.min(2, b.velocity.y) });

        if (!winnerInfo && b.finishOrder === targetRank) {
          winnerInfo = { rank: b.finishOrder, name: b.ballName };
          winnerBanner.textContent = `${winnerInfo.rank}번째 통과 - ${winnerInfo.name} win!`;
          winnerBanner.classList.add("show");
          statusBar.textContent = `${b.finishOrder}번째 당첨: ${b.ballName}`;
        } else {
          statusBar.textContent = `${b.finishOrder}등 통과: ${b.ballName}`;
        }

        updateRankBoard();
      }

      function getLeaderBall() {
        let leader = null;
        let maxY = -Infinity;
        for (const b of balls) {
          if (!b.finished && b.position.y > maxY) {
            maxY = b.position.y;
            leader = b;
          }
        }
        return leader || balls.find(b => b.finished) || balls[0] || null;
      }

      function updateCamera() {
        const leader = getLeaderBall();
        if (!leader) return;

        camera.zoom += (camera.targetZoom - camera.zoom) * 0.03;
        camera.x += (leader.position.x - camera.x) * 0.08;
        camera.y += (leader.position.y - camera.y) * 0.08;

        const halfW = viewW / camera.zoom / 2;
        const halfH = viewH / camera.zoom / 2;

        camera.x = Math.max(220 + halfW * 0.4, Math.min(WORLD_W - 220 - halfW * 0.4, camera.x));
        camera.y = Math.max(halfH + 80, Math.min(WORLD_H - halfH - 80, camera.y));
      }

      function updateSpinners() {
        for (const s of spinners) {
          Body.setAngle(s, s.angle + s.spinSpeed);
        }
      }

      function constrainBalls() {
        for (const b of balls) {
          if (b.position.x < 240) Body.setPosition(b, { x: 240, y: b.position.y });
          if (b.position.x > WORLD_W - 240) Body.setPosition(b, { x: WORLD_W - 240, y: b.position.y });

          if (started && !b.finished && b.position.y > 10000) {
            const dx = 1100 - b.position.x;
            Body.applyForce(b, b.position, { x: dx * 0.000001, y: 0.000002 });
          }
        }
      }

      function worldToScreen(x, y) {
        return {
          x: (x - camera.x) * camera.zoom + viewW / 2,
          y: (y - camera.y) * camera.zoom + viewH / 2
        };
      }

      function drawBackground() {
        ctx.clearRect(0, 0, viewW, viewH);

        const glow = ctx.createRadialGradient(viewW/2, 80, 10, viewW/2, 80, viewH*0.75);
        glow.addColorStop(0, "rgba(255,255,255,0.07)");
        glow.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, viewW, viewH);
      }

      function drawPolygon(body, fillA, fillB) {
        const verts = body.vertices.map(v => worldToScreen(v.x, v.y));
        ctx.beginPath();
        ctx.moveTo(verts[0].x, verts[0].y);
        for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
        ctx.closePath();

        const grad = ctx.createLinearGradient(verts[0].x, verts[0].y, verts[2].x, verts[2].y);
        grad.addColorStop(0, fillA);
        grad.addColorStop(1, fillB);

        ctx.fillStyle = grad;
        ctx.shadowColor = "rgba(255,255,255,0.16)";
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      function drawWall(body) {
        if (body.renderKind === "hidden") return;
        drawPolygon(body, "rgba(255,255,255,0.98)", "rgba(214,214,214,0.84)");
      }

      function drawPeg(body) {
        const p = worldToScreen(body.position.x, body.position.y);
        const r = body.circleRadius * camera.zoom;
        if (r < 1) return;

        const g = ctx.createRadialGradient(p.x - r*0.35, p.y - r*0.4, r*0.1, p.x, p.y, r);
        g.addColorStop(0, "#ffffff");
        g.addColorStop(0.5, "#dadada");
        g.addColorStop(1, "#8b8b8b");

        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      }

      function drawBall(body) {
        const p = worldToScreen(body.position.x, body.position.y);
        const r = body.circleRadius * camera.zoom;
        if (p.x < -r*3 || p.x > viewW + r*3 || p.y < -r*3 || p.y > viewH + r*3) return;

        const g = ctx.createRadialGradient(p.x - r*0.35, p.y - r*0.45, r*0.12, p.x, p.y, r);
        g.addColorStop(0, "#ffffff");
        g.addColorStop(0.45, body.ballColor);
        g.addColorStop(1, "#777");

        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.shadowColor = "rgba(255,255,255,0.18)";
        ctx.shadowBlur = 16;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(0,0,0,0.45)";
        ctx.lineWidth = Math.max(1, r * 0.08);
        ctx.stroke();

        ctx.translate(p.x, p.y);
        ctx.rotate(body.angle);
        ctx.fillStyle = "#111";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 ${Math.max(9, r * 0.42)}px Malgun Gothic, sans-serif`;
        let txt = body.ballName;
        if (txt.length > 3) txt = txt.slice(0, 3);
        ctx.fillText(txt, 0, 0);
        ctx.restore();

        if (body.finished) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, r + 4, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineWidth = Math.max(2, r * 0.08);
          ctx.stroke();
        }
      }

      function drawWorld() {
        drawBackground();

        const topLeft = worldToScreen(220, 120);
        const bottomRight = worldToScreen(WORLD_W - 220, WORLD_H - 220);
        ctx.fillStyle = "#121212";
        ctx.fillRect(
          topLeft.x,
          topLeft.y,
          bottomRight.x - topLeft.x,
          bottomRight.y - topLeft.y
        );

        for (const w of walls) drawWall(w);
        for (const p of pegs) drawPeg(p);
        for (const s of spinners) drawWall(s);
        for (const b of balls) drawBall(b);
      }

      function drawMiniMap() {
        const mw = miniMap.width;
        const mh = miniMap.height;
        miniCtx.clearRect(0, 0, mw, mh);
        miniCtx.fillStyle = "#090909";
        miniCtx.fillRect(0, 0, mw, mh);

        const pad = 8;
        const scale = Math.min((mw - pad*2) / WORLD_W, (mh - pad*2) / WORLD_H);

        function mx(x){ return pad + x * scale; }
        function my(y){ return pad + y * scale; }

        miniCtx.fillStyle = "#111";
        miniCtx.fillRect(mx(220), my(120), (WORLD_W - 440)*scale, (WORLD_H - 340)*scale);

        miniCtx.strokeStyle = "rgba(255,255,255,0.88)";
        miniCtx.lineWidth = 1;
        for (const w of walls) {
          if (w.renderKind === "hidden") continue;
          miniCtx.beginPath();
          miniCtx.moveTo(mx(w._p1.x), my(w._p1.y));
          miniCtx.lineTo(mx(w._p2.x), my(w._p2.y));
          miniCtx.stroke();
        }

        miniCtx.fillStyle = "rgba(255,255,255,0.55)";
        for (const p of pegs) {
          miniCtx.beginPath();
          miniCtx.arc(mx(p.position.x), my(p.position.y), Math.max(0.8, p.circleRadius * scale), 0, Math.PI*2);
          miniCtx.fill();
        }

        for (const b of balls) {
          miniCtx.beginPath();
          miniCtx.fillStyle = b.finished ? "#fff" : "#cfcfcf";
          miniCtx.arc(mx(b.position.x), my(b.position.y), Math.max(1.2, b.circleRadius * scale * 1.1), 0, Math.PI*2);
          miniCtx.fill();
        }

        const cameraWorldW = viewW / camera.zoom;
        const cameraWorldH = viewH / camera.zoom;
        const vx = camera.x - cameraWorldW / 2;
        const vy = camera.y - cameraWorldH / 2;

        miniCtx.strokeStyle = "rgba(255,255,255,0.95)";
        miniCtx.lineWidth = 1.2;
        miniCtx.strokeRect(mx(vx), my(vy), cameraWorldW * scale, cameraWorldH * scale);
      }

      function loop() {
        updateSpinners();
        Engine.update(engine, 1000 / 60);
        constrainBalls();
        updateCamera();
        drawWorld();
        drawMiniMap();
        requestAnimationFrame(loop);
      }

      shuffledNames = parseNames();
      rebuildGame(true);
      updateRankBoard();
      loop();
    })();
  </script>
</body>
