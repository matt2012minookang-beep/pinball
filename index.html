<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뽑기게임</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.08), transparent 16%),
        radial-gradient(circle at 15% 50%, rgba(255,255,255,0.03), transparent 20%),
        radial-gradient(circle at 85% 50%, rgba(255,255,255,0.03), transparent 20%),
        #000;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      gap: 16px;
      padding: 16px;
    }

    .panel {
      background: rgba(140, 140, 140, 0.15);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 0 24px rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #leftPanel {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
      z-index: 10;
    }

    #miniPanel {
      padding: 12px;
      height: 250px;
    }

    #miniTitle {
      font-weight: 900;
      font-size: 15px;
      margin-bottom: 8px;
    }

    #miniMap {
      width: 100%;
      height: 195px;
      display: block;
      background: #060606;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
    }

    #controlPanel {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .label {
      font-size: 13px;
      color: #d5d5d5;
      margin-bottom: 6px;
      font-weight: 700;
    }

    textarea, input {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 12px;
      font-size: 15px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07);
    }

    textarea {
      resize: none;
      height: 165px;
      line-height: 1.45;
    }

    input { height: 44px; }

    button {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 8px 18px rgba(0,0,0,0.28),
        0 0 18px rgba(255,255,255,0.05);
      transition: transform .08s ease, filter .12s ease;
    }

    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }

    #shuffleBtn {
      height: 58px;
      font-size: 28px;
    }

    #startBtn {
      height: 72px;
      font-size: 34px;
    }

    #hint {
      white-space: pre-line;
      font-size: 12px;
      line-height: 1.45;
      color: #dbdbdb;
      opacity: 0.92;
    }

    #rightWrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(circle at 50% 6%, rgba(255,255,255,0.06), transparent 14%),
        #040404;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 28px rgba(255,255,255,0.03);
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #rankBoard {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 230px;
      max-height: calc(100% - 32px);
      overflow: auto;
      padding: 14px;
      z-index: 10;
    }

    #rankBoardTitle {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    #rankText {
      font-size: 17px;
      line-height: 1.6;
      font-weight: 800;
    }

    #winnerBanner {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 10;
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: 0 0 22px rgba(255,255,255,0.10);
      font-size: 34px;
      font-weight: 900;
      opacity: 0;
      transition: opacity .2s ease;
      pointer-events: none;
    }

    #winnerBanner.show { opacity: 1; }

    #statusBar {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 10px 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="leftPanel">
      <div id="miniPanel" class="panel">
        <div id="miniTitle">전체 맵</div>
        <canvas id="miniMap" width="296" height="195"></canvas>
      </div>

      <div id="controlPanel" class="panel">
        <div>
          <div class="label">이름 입력 (쉼표 구분, 이름*개수 지원)</div>
          <textarea id="namesInput">1*20,2,3,민수*5,지,원*3</textarea>
        </div>

        <div>
          <div class="label">몇 번째가 당첨인지</div>
          <input id="targetInput" type="number" min="1" value="10" />
        </div>

        <button id="shuffleBtn">셔플</button>
        <button id="startBtn">시작</button>

        <div id="hint">예) 1*20 = 이름이 1인 공 20개
맵 폭 넓힘 / 막히는 경사 제거
원형 네온 패드에 닿으면 안으로 들어가 1초 뒤 아래로 팡!
시작 전엔 절대 안 움직임</div>
      </div>
    </div>

    <div id="rightWrap">
      <canvas id="scene"></canvas>

      <div id="rankBoard" class="panel">
        <div id="rankBoardTitle">현재 순위</div>
        <div id="rankText">아직 시작 전</div>
      </div>

      <div id="winnerBanner"></div>
      <div id="statusBar" class="panel">대기 중</div>
    </div>
  </div>

  <script>
    (() => {
      const rightWrap = document.getElementById("rightWrap");
      const scene = document.getElementById("scene");
      const ctx = scene.getContext("2d");
      const miniMap = document.getElementById("miniMap");
      const miniCtx = miniMap.getContext("2d");

      const namesInput = document.getElementById("namesInput");
      const targetInput = document.getElementById("targetInput");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const startBtn = document.getElementById("startBtn");
      const rankText = document.getElementById("rankText");
      const winnerBanner = document.getElementById("winnerBanner");
      const statusBar = document.getElementById("statusBar");

      const WORLD_W = 2200;
      let WORLD_TOP = -6000;
      let WORLD_BOTTOM = 18200;

      const GRAVITY = 1880;
      const AIR = 0.001;
      const RESTITUTION = 0.76;
      const TANGENT_FRICTION = 0.988;
      const MAX_DT = 1 / 30;
      const FIXED_DT = 1 / 120;

      const LEFT_LIMIT = 260;
      const RIGHT_LIMIT = WORLD_W - 260;

      const camera = {
        x: WORLD_W / 2,
        y: 1500,
        zoom: 1,
        targetX: WORLD_W / 2,
        targetY: 1500,
        targetZoom: 1
      };

      let segments = [];
      let pegs = [];
      let spinners = [];
      let launchPads = [];
      let finishSensor = null;
      let balls = [];
      let rankings = [];
      let shuffledNames = [];
      let started = false;
      let targetRank = 10;
      let winnerInfo = null;
      let followEnabled = false;
      let startTime = 0;
      let lastTime = 0;
      let accumulator = 0;

      const ballColors = ["#ffffff","#efefef","#d8d8d8","#f4f4f4","#cccccc","#e6e6e6"];

      function resize() {
        const rect = rightWrap.getBoundingClientRect();
        scene.width = Math.max(100, Math.floor(rect.width));
        scene.height = Math.max(100, Math.floor(rect.height));
        if (!started) setInitialCamera(true);
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, ch => ({
          "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
        }[ch]));
      }

      function parseNames() {
        const raw = namesInput.value.split(",").map(v => v.trim()).filter(Boolean);
        const out = [];
        for (const token of raw) {
          const m = token.match(/^(.*?)\*(\d+)$/);
          if (m) {
            const label = m[1].trim() || "공";
            const count = Math.max(1, Math.min(5000, parseInt(m[2], 10) || 1));
            for (let i = 0; i < count; i++) out.push(label);
          } else {
            out.push(token);
          }
        }
        return out.length ? out : ["1","2","3"];
      }

      function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function resetWorld() {
        segments = [];
        pegs = [];
        spinners = [];
        launchPads = [];
        finishSensor = null;
        balls = [];
        rankings = [];
        started = false;
        followEnabled = false;
        startTime = 0;
        winnerInfo = null;
        winnerBanner.classList.remove("show");
        winnerBanner.textContent = "";
        rankText.innerHTML = "아직 시작 전";
        statusBar.textContent = "대기 중";
      }

      function addSegment(x1, y1, x2, y2, thickness = 20, kind = "wall") {
        segments.push({ x1, y1, x2, y2, thickness, kind });
      }

      function addPeg(x, y, r = 11) {
        pegs.push({ x, y, r });
      }

      function addSpinner(x, y, length = 180, thickness = 14, speed = 1.0) {
        spinners.push({ x, y, length, thickness, angle: 0, speed });
      }

      function addLaunchPad(x, y, r = 56) {
        launchPads.push({ x, y, r, pulse: Math.random() * Math.PI * 2 });
        addSegment(x - 86, y - 56, x - 18, y + 10, 16);
        addSegment(x + 86, y - 56, x + 18, y + 10, 16);
        addSegment(x - 18, y + 16, x - 56, y + 118, 14);
        addSegment(x + 18, y + 16, x + 56, y + 118, 14);
      }

      function setFinishSensor(x, y, w, h) {
        finishSensor = { x, y, w, h };
      }

      function buildMap(spawnRows) {
        resetWorld();

        const topBuffer = Math.max(6200, spawnRows * 82 + 3000);
        WORLD_TOP = -topBuffer;

        const baseY = 1600;

        const leftPts = [
          [360, WORLD_TOP],
          [360, baseY + 100],
          [620, baseY + 1200],
          [620, baseY + 2100],
          [980, baseY + 3200],
          [980, baseY + 5000],
          [700, baseY + 6400],
          [700, baseY + 8000],
          [1060, baseY + 9600],
          [1060, baseY + 11600],
          [760, baseY + 13200],
          [760, baseY + 15200],
          [940, baseY + 16800]
        ];

        const rightPts = [
          [1840, WORLD_TOP],
          [1840, baseY + 100],
          [1580, baseY + 1200],
          [1580, baseY + 2100],
          [1220, baseY + 3200],
          [1220, baseY + 5000],
          [1500, baseY + 6400],
          [1500, baseY + 8000],
          [1140, baseY + 9600],
          [1140, baseY + 11600],
          [1440, baseY + 13200],
          [1440, baseY + 15200],
          [1260, baseY + 16800]
        ];

        for (let i = 0; i < leftPts.length - 1; i++) {
          addSegment(leftPts[i][0], leftPts[i][1], leftPts[i + 1][0], leftPts[i + 1][1], 30);
        }
        for (let i = 0; i < rightPts.length - 1; i++) {
          addSegment(rightPts[i][0], rightPts[i][1], rightPts[i + 1][0], rightPts[i + 1][1], 30);
        }
        addSegment(leftPts[0][0], leftPts[0][1], rightPts[0][0], rightPts[0][1], 30);

        // 넓은 첫 진입
        addSegment(820, baseY + 820, 1020, baseY + 1280, 18);
        addSegment(1380, baseY + 820, 1180, baseY + 1280, 18);
        addSegment(1020, baseY + 1280, 1100, baseY + 1490, 14);
        addSegment(1180, baseY + 1280, 1100, baseY + 1490, 14);

        // 넓은 채널형 방향 전환들
        addSegment(860, baseY + 2400, 1320, baseY + 2610, 18);
        addSegment(1360, baseY + 3200, 1040, baseY + 3500, 18);

        addSegment(900, baseY + 4300, 1300, baseY + 4490, 18);
        addSegment(1340, baseY + 5180, 1040, baseY + 5470, 18);

        // 첫 발사장치
        addLaunchPad(1100, baseY + 6350);

        // 넓은 발사 후 채널
        addSegment(920, baseY + 7380, 1300, baseY + 7570, 18);
        addSegment(1330, baseY + 8250, 1060, baseY + 8510, 18);

        // 회전막대 존
        addSpinner(1100, baseY + 9400, 280, 14, 0.9);
        addSpinner(930, baseY + 9960, 170, 12, -0.82);
        addSpinner(1270, baseY + 9960, 170, 12, 0.82);

        addSegment(930, baseY + 10840, 1290, baseY + 11020, 18);
        addSegment(1320, baseY + 11680, 1060, baseY + 11940, 18);

        // 두 번째 발사장치
        addLaunchPad(1100, baseY + 12700);

        // 청록 체브론 느낌
        addSegment(900, baseY + 13620, 960, baseY + 13750, 10, "accent");
        addSegment(1020, baseY + 13620, 1080, baseY + 13750, 10, "accent");
        addSegment(1140, baseY + 13620, 1200, baseY + 13750, 10, "accent");
        addSegment(1260, baseY + 13620, 1320, baseY + 13750, 10, "accent");

        addSegment(930, baseY + 14380, 1280, baseY + 14570, 18);
        addSegment(1310, baseY + 15220, 1080, baseY + 15460, 18);

        // 마지막 좁혀짐 - 폭 조금 넓게
        addSegment(980, baseY + 16050, 1070, baseY + 16780, 18);
        addSegment(1220, baseY + 16050, 1130, baseY + 16780, 18);

        addSegment(1088, baseY + 16780, 1088, baseY + 17480, 14);
        addSegment(1112, baseY + 16780, 1112, baseY + 17480, 14);

        setFinishSensor(1100, baseY + 17600, 92, 90);
        WORLD_BOTTOM = baseY + 18100;

        // 청록 핀
        for (let y = baseY + 1900; y <= baseY + 15500; y += 900) {
          const row = Math.floor((y - (baseY + 1900)) / 900);
          const cols = row % 2 === 0 ? 4 : 3;
          const sx = cols === 4 ? 900 : 960;
          for (let i = 0; i < cols; i++) {
            addPeg(sx + i * 120, y, 10);
          }
        }
      }

      function buildBalls(names) {
        const r = 24;
        const spawnLeft = 620;
        const spawnRight = 1580;
        const gapX = 52;
        const gapY = 60;
        const cols = Math.max(1, Math.floor((spawnRight - spawnLeft) / gapX));
        const rows = Math.ceil(names.length / cols);
        const startY = WORLD_TOP + 320;

        balls = names.map((name, i) => {
          const row = Math.floor(i / cols);
          const col = i % cols;
          const rowCount = Math.min(cols, names.length - row * cols);
          const totalWidth = (rowCount - 1) * gapX;
          const x0 = (WORLD_W / 2) - totalWidth / 2;

          return {
            x: x0 + col * gapX,
            y: startY + row * gapY,
            vx: 0,
            vy: 0,
            r,
            angle: 0,
            av: 0,
            name,
            color: ballColors[i % ballColors.length],
            finished: false,
            finishOrder: 0,
            captured: false,
            capturePadIndex: -1,
            launchQueued: false,
            launchAt: 0,
            flashUntil: 0,
            slowTimer: 0
          };
        });

        return rows;
      }

      function setInitialCamera(instant = true) {
        const vw = scene.width;
        const vh = scene.height;
        const z = Math.min(vw / (WORLD_W + 240), vh / 3800);

        camera.targetX = WORLD_W / 2;
        camera.targetY = WORLD_TOP + 1800;
        camera.targetZoom = z;

        if (instant) {
          camera.x = camera.targetX;
          camera.y = camera.targetY;
          camera.zoom = camera.targetZoom;
        }
      }

      function rebuildGame(useCurrentShuffle) {
        targetRank = Math.max(1, parseInt(targetInput.value || "1", 10));
        const rawNames = parseNames();
        if (!useCurrentShuffle || shuffledNames.length !== rawNames.length) {
          shuffledNames = [...rawNames];
        }

        const estimatedCols = Math.max(1, Math.floor((1580 - 620) / 52));
        const spawnRows = Math.ceil(shuffledNames.length / estimatedCols);
        buildMap(spawnRows);
        buildBalls(shuffledNames);
        setInitialCamera(true);
      }

      function updateRankBoard() {
        if (!rankings.length) {
          rankText.innerHTML = started ? "아직 통과한 공 없음" : "아직 시작 전";
          return;
        }
        rankText.innerHTML = rankings.slice(0, 15).map((b, i) => `${i + 1}등: ${escapeHtml(b.name)}`).join("<br>");
      }

      function doShuffle() {
        const raw = parseNames();
        shuffledNames = shuffleArray(raw);
        rebuildGame(true);
        statusBar.textContent = "셔플 완료";
        updateRankBoard();
      }

      function startGame() {
        if (started) return;
        started = true;
        followEnabled = false;
        startTime = performance.now();
        statusBar.textContent = "시작! 상단 고정 후 추적 전환";

        const followZoom = Math.min(scene.width / 1180, scene.height / 2000);
        camera.targetZoom = followZoom;

        for (const b of balls) {
          b.vx = (Math.random() - 0.5) * 8;
          b.vy = 0;
          b.av = 0;
        }
      }

      function getLeaderBall() {
        let leader = null;
        let maxY = -Infinity;
        for (const b of balls) {
          if (!b.finished && b.y > maxY) {
            maxY = b.y;
            leader = b;
          }
        }
        return leader || balls.find(b => b.finished) || balls[0] || null;
      }

      function updateCamera(now) {
        if (!started) {
          camera.x += (camera.targetX - camera.x) * 0.08;
          camera.y += (camera.targetY - camera.y) * 0.08;
          camera.zoom += (camera.targetZoom - camera.zoom) * 0.08;
          return;
        }

        if (!followEnabled && now - startTime >= 1200) {
          followEnabled = true;
          statusBar.textContent = "선두 공 추적 시작";
        }

        if (!followEnabled) {
          camera.targetX = WORLD_W / 2;
          camera.targetY = WORLD_TOP + 2200;
        } else {
          const leader = getLeaderBall();
          if (leader) {
            camera.targetX = Math.max(440, Math.min(WORLD_W - 440, leader.x));
            camera.targetY = Math.max(WORLD_TOP + 1500, Math.min(WORLD_BOTTOM - 1300, leader.y));
          }
        }

        camera.x += (camera.targetX - camera.x) * 0.13;
        camera.y += (camera.targetY - camera.y) * 0.13;
        camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;
      }

      function closestPointOnSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return { x: x1, y: y1, t: 0 };
        let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        return { x: x1 + dx * t, y: y1 + dy * t, t };
      }

      function resolveBallSegment(ball, x1, y1, x2, y2, thickness, surfaceVx = 0, surfaceVy = 0) {
        const cp = closestPointOnSegment(ball.x, ball.y, x1, y1, x2, y2);
        let dx = ball.x - cp.x;
        let dy = ball.y - cp.y;
        let dist = Math.hypot(dx, dy);
        const minDist = ball.r + thickness * 0.5;

        if (dist === 0) {
          dx = 0; dy = -1; dist = 1;
        }

        if (dist < minDist) {
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;

          ball.x += nx * overlap;
          ball.y += ny * overlap;

          const rvx = ball.vx - surfaceVx;
          const rvy = ball.vy - surfaceVy;
          const vn = rvx * nx + rvy * ny;

          if (vn < 0) {
            const bounce = -(1 + RESTITUTION) * vn;
            ball.vx += nx * bounce;
            ball.vy += ny * bounce;
          }

          const tx = -ny;
          const ty = nx;
          const vt = ball.vx * tx + ball.vy * ty;
          ball.vx -= tx * vt * (1 - TANGENT_FRICTION);
          ball.vy -= ty * vt * (1 - TANGENT_FRICTION);
        }
      }

      function resolveBallPeg(ball, peg) {
        let dx = ball.x - peg.x;
        let dy = ball.y - peg.y;
        let dist = Math.hypot(dx, dy);
        const minDist = ball.r + peg.r;

        if (dist === 0) {
          dx = 0; dy = -1; dist = 1;
        }

        if (dist < minDist) {
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;

          ball.x += nx * overlap;
          ball.y += ny * overlap;

          const vn = ball.vx * nx + ball.vy * ny;
          if (vn < 0) {
            const bounce = -(1 + 0.82) * vn;
            ball.vx += nx * bounce;
            ball.vy += ny * bounce;
          }
        }
      }

      function resolveBallBall(a, b) {
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        let dist = Math.hypot(dx, dy);
        const minDist = a.r + b.r;

        if (dist === 0) {
          dx = 1; dy = 0; dist = 1;
        }

        if (dist < minDist) {
          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;
          const push = overlap * 0.5;

          a.x -= nx * push;
          a.y -= ny * push;
          b.x += nx * push;
          b.y += ny * push;

          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const vn = rvx * nx + rvy * ny;
          if (vn < 0) {
            const impulse = -(1 + 0.88) * vn * 0.5;
            a.vx -= nx * impulse;
            a.vy -= ny * impulse;
            b.vx += nx * impulse;
            b.vy += ny * impulse;
          }
        }
      }

      function pointInRect(px, py, x, y, w, h) {
        return px >= x - w / 2 && px <= x + w / 2 && py >= y - h / 2 && py <= y + h / 2;
      }

      function stepPhysics(dt, now) {
        if (!started) return;

        for (const s of spinners) {
          s.angle += s.speed * dt;
        }

        for (const b of balls) {
          if (b.finished) continue;

          if (b.captured) {
            const pad = launchPads[b.capturePadIndex];
            if (pad) {
              b.x = pad.x;
              b.y = pad.y;
              b.vx = 0;
              b.vy = 0;
              b.av = 0;
              b.angle += 2.6 * dt;
            }

            if (b.launchQueued && now >= b.launchAt) {
              b.captured = false;
              b.launchQueued = false;
              b.flashUntil = now + 450;
              const side = Math.random() < 0.5 ? -1 : 1;
              b.vx = side * (190 + Math.random() * 160);
              b.vy = 600 + Math.random() * 180;
              b.av = (Math.random() - 0.5) * 6;
            }
            continue;
          }

          if (!Number.isFinite(b.x) || !Number.isFinite(b.y) || !Number.isFinite(b.vx) || !Number.isFinite(b.vy)) {
            b.x = WORLD_W / 2;
            b.y = WORLD_TOP + 500;
            b.vx = 0;
            b.vy = 0;
          }

          b.vy += GRAVITY * dt;
          b.vx *= (1 - AIR);
          b.vy *= (1 - AIR * 0.5);
          b.angle += b.av * dt;

          b.x += b.vx * dt;
          b.y += b.vy * dt;
        }

        for (let iter = 0; iter < 2; iter++) {
          for (const b of balls) {
            if (b.finished || b.captured) continue;

            if (b.x < LEFT_LIMIT + b.r) { b.x = LEFT_LIMIT + b.r; b.vx = Math.abs(b.vx) * 0.45; }
            if (b.x > RIGHT_LIMIT - b.r) { b.x = RIGHT_LIMIT - b.r; b.vx = -Math.abs(b.vx) * 0.45; }
            if (b.y < WORLD_TOP + b.r) { b.y = WORLD_TOP + b.r; b.vy = Math.abs(b.vy) * 0.2; }

            for (const seg of segments) {
              resolveBallSegment(b, seg.x1, seg.y1, seg.x2, seg.y2, seg.thickness);
            }

            for (const peg of pegs) {
              resolveBallPeg(b, peg);
            }

            for (const spinner of spinners) {
              const half = spinner.length * 0.5;
              const cos = Math.cos(spinner.angle);
              const sin = Math.sin(spinner.angle);
              const x1 = spinner.x - cos * half;
              const y1 = spinner.y - sin * half;
              const x2 = spinner.x + cos * half;
              const y2 = spinner.y + sin * half;

              const cp = closestPointOnSegment(b.x, b.y, x1, y1, x2, y2);
              const rx = cp.x - spinner.x;
              const ry = cp.y - spinner.y;
              const surfaceVx = -spinner.speed * ry * 100;
              const surfaceVy = spinner.speed * rx * 100;
              resolveBallSegment(b, x1, y1, x2, y2, spinner.thickness, surfaceVx, surfaceVy);
            }
          }

          for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
              if (balls[i].finished || balls[j].finished || balls[i].captured || balls[j].captured) continue;
              resolveBallBall(balls[i], balls[j]);
            }
          }
        }

        for (const b of balls) {
          if (b.finished || b.captured) continue;

          const speed = Math.hypot(b.vx, b.vy);
          if (speed < 18 && b.y > WORLD_TOP + 800) b.slowTimer += dt;
          else b.slowTimer = 0;

          if (b.slowTimer > 0.35) {
            b.vy += 180 + Math.random() * 45;
            b.vx += (Math.random() - 0.5) * 12;
            b.slowTimer = 0.06;
          }

          for (let p = 0; p < launchPads.length; p++) {
            const pad = launchPads[p];
            const dx = b.x - pad.x;
            const dy = b.y - pad.y;
            const dist = Math.hypot(dx, dy);
            if (dist < pad.r - b.r * 0.15) {
              b.captured = true;
              b.capturePadIndex = p;
              b.launchQueued = true;
              b.launchAt = now + 1000;
              b.x = pad.x;
              b.y = pad.y;
              b.vx = 0;
              b.vy = 0;
              break;
            }
          }

          if (finishSensor && pointInRect(b.x, b.y, finishSensor.x, finishSensor.y, finishSensor.w, finishSensor.h)) {
            b.finished = true;
            b.finishOrder = rankings.length + 1;
            rankings.push(b);
            b.vx = 0;
            b.vy = Math.min(b.vy, 80);

            if (!winnerInfo && b.finishOrder === targetRank) {
              winnerInfo = { rank: b.finishOrder, name: b.name };
              winnerBanner.textContent = `${winnerInfo.rank}번째 통과 - ${winnerInfo.name} win!`;
              winnerBanner.classList.add("show");
              statusBar.textContent = `${b.finishOrder}번째 당첨: ${b.name}`;
            } else {
              statusBar.textContent = `${b.finishOrder}등 통과: ${b.name}`;
            }
            updateRankBoard();
          }
        }
      }

      function worldToScreen(x, y) {
        return {
          x: (x - camera.x) * camera.zoom + scene.width / 2,
          y: (y - camera.y) * camera.zoom + scene.height / 2
        };
      }

      function drawBackground() {
        ctx.clearRect(0, 0, scene.width, scene.height);
        const glow = ctx.createRadialGradient(scene.width / 2, 70, 10, scene.width / 2, 70, scene.height * 0.7);
        glow.addColorStop(0, "rgba(255,255,255,0.06)");
        glow.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, scene.width, scene.height);
      }

      function drawChamberFill() {
        const tl = worldToScreen(LEFT_LIMIT, WORLD_TOP);
        const br = worldToScreen(RIGHT_LIMIT, WORLD_BOTTOM);
        ctx.fillStyle = "#101010";
        ctx.fillRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
      }

      function drawSegment(seg) {
        const p1 = worldToScreen(seg.x1, seg.y1);
        const p2 = worldToScreen(seg.x2, seg.y2);
        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        const len = Math.hypot(p2.x - p1.x, p2.y - p1.y);

        ctx.save();
        ctx.translate((p1.x + p2.x) / 2, (p1.y + p2.y) / 2);
        ctx.rotate(angle);

        let fillA = "rgba(255,255,255,0.98)";
        let fillB = "rgba(214,214,214,0.84)";
        let shadow = "rgba(255,255,255,0.14)";

        if (seg.kind === "accent") {
          fillA = "rgba(40,220,255,0.95)";
          fillB = "rgba(0,150,255,0.85)";
          shadow = "rgba(0,180,255,0.45)";
        }

        const g = ctx.createLinearGradient(-len / 2, 0, len / 2, 0);
        g.addColorStop(0, fillA);
        g.addColorStop(1, fillB);

        ctx.fillStyle = g;
        ctx.shadowColor = shadow;
        ctx.shadowBlur = seg.kind === "accent" ? 18 : 10;
        ctx.fillRect(-len / 2, -(seg.thickness * camera.zoom) / 2, len, seg.thickness * camera.zoom);
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      function drawPeg(peg) {
        const p = worldToScreen(peg.x, peg.y);
        const r = peg.r * camera.zoom;
        if (r < 1) return;

        const g = ctx.createRadialGradient(p.x - r * 0.35, p.y - r * 0.35, r * 0.12, p.x, p.y, r);
        g.addColorStop(0, "#7ef2ff");
        g.addColorStop(0.6, "#25cfff");
        g.addColorStop(1, "#0e8fff");

        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.shadowColor = "rgba(0,180,255,0.45)";
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      function drawLaunchPad(pad, now) {
        const p = worldToScreen(pad.x, pad.y);
        const r = pad.r * camera.zoom;
        if (r < 2) return;

        const pulse = 0.5 + 0.5 * Math.sin(now * 0.005 + pad.pulse);

        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,180,255,${0.12 + pulse * 0.12})`;
        ctx.fill();

        ctx.strokeStyle = `rgba(80,220,255,${0.85 + pulse * 0.15})`;
        ctx.lineWidth = Math.max(2, r * 0.09);
        ctx.shadowColor = "rgba(0,180,255,0.9)";
        ctx.shadowBlur = 28;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 0.52, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(100,230,255,0.18)";
        ctx.fill();
        ctx.restore();
      }

      function drawSpinner(sp) {
        const half = sp.length * 0.5;
        const cos = Math.cos(sp.angle);
        const sin = Math.sin(sp.angle);
        const x1 = sp.x - cos * half;
        const y1 = sp.y - sin * half;
        const x2 = sp.x + cos * half;
        const y2 = sp.y + sin * half;
        drawSegment({ x1, y1, x2, y2, thickness: sp.thickness, kind: "accent" });
      }

      function drawBall(ball, now) {
        const p = worldToScreen(ball.x, ball.y);
        const r = ball.r * camera.zoom;
        if (p.x < -r * 4 || p.x > scene.width + r * 4 || p.y < -r * 4 || p.y > scene.height + r * 4) return;

        const flash = ball.flashUntil && now < ball.flashUntil;
        const captured = ball.captured;
        const g = ctx.createRadialGradient(p.x - r * 0.35, p.y - r * 0.45, r * 0.12, p.x, p.y, r);
        g.addColorStop(0, "#ffffff");
        g.addColorStop(0.45, captured ? "#9fe8ff" : (flash ? "#9fe8ff" : ball.color));
        g.addColorStop(1, captured ? "#00ccff" : (flash ? "#00a8ff" : "#777777"));

        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.shadowColor = (flash || captured) ? "rgba(0,180,255,0.55)" : "rgba(255,255,255,0.16)";
        ctx.shadowBlur = (flash || captured) ? 26 : 16;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(0,0,0,0.45)";
        ctx.lineWidth = Math.max(1, r * 0.08);
        ctx.stroke();

        if (camera.zoom > 0.24 && balls.length <= 250) {
          ctx.translate(p.x, p.y);
          ctx.rotate(ball.angle);
          ctx.fillStyle = "#111";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `900 ${Math.max(8, r * 0.5)}px Malgun Gothic, sans-serif`;
          let txt = ball.name;
          if (txt.length > 3) txt = txt.slice(0, 3);
          ctx.fillText(txt, 0, 0);
        }
        ctx.restore();

        if (ball.finished) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, r + 4, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.95)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      function drawBlastText(now) {
        ctx.save();
        ctx.fillStyle = "rgba(120,230,255,0.95)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 24px Malgun Gothic, sans-serif";
        ctx.shadowColor = "rgba(0,180,255,0.8)";
        ctx.shadowBlur = 16;

        for (const b of balls) {
          if (b.flashUntil && now < b.flashUntil) {
            const p = worldToScreen(b.x, b.y - 90);
            if (p.x >= -100 && p.x <= scene.width + 100 && p.y >= -100 && p.y <= scene.height + 100) {
              ctx.fillText("팡!", p.x, p.y);
            }
          }
        }
        ctx.restore();
      }

      function drawFinishSensor() {
        if (!finishSensor) return;
        const tl = worldToScreen(finishSensor.x - finishSensor.w / 2, finishSensor.y - finishSensor.h / 2);
        const br = worldToScreen(finishSensor.x + finishSensor.w / 2, finishSensor.y + finishSensor.h / 2);
        ctx.save();
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = "rgba(255,255,255,0.7)";
        ctx.lineWidth = 2;
        ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
        ctx.restore();
      }

      function drawMainScene(now) {
        drawBackground();
        drawChamberFill();
        for (const seg of segments) drawSegment(seg);
        for (const peg of pegs) drawPeg(peg);
        for (const sp of spinners) drawSpinner(sp);
        for (const pad of launchPads) drawLaunchPad(pad, now);
        for (const ball of balls) drawBall(ball, now);
        drawFinishSensor();
        drawBlastText(now);
      }

      function drawMiniMap() {
        const mw = miniMap.width;
        const mh = miniMap.height;
        miniCtx.clearRect(0, 0, mw, mh);
        miniCtx.fillStyle = "#050505";
        miniCtx.fillRect(0, 0, mw, mh);

        const pad = 8;
        const scale = Math.min((mw - pad * 2) / WORLD_W, (mh - pad * 2) / (WORLD_BOTTOM - WORLD_TOP));
        const mx = x => pad + x * scale;
        const my = y => pad + (y - WORLD_TOP) * scale;

        miniCtx.fillStyle = "#101010";
        miniCtx.fillRect(mx(LEFT_LIMIT), my(WORLD_TOP), (RIGHT_LIMIT - LEFT_LIMIT) * scale, (WORLD_BOTTOM - WORLD_TOP) * scale);

        for (const seg of segments) {
          miniCtx.strokeStyle = seg.kind === "accent" ? "rgba(60,220,255,0.95)" : "rgba(255,255,255,0.88)";
          miniCtx.lineWidth = 1;
          miniCtx.beginPath();
          miniCtx.moveTo(mx(seg.x1), my(seg.y1));
          miniCtx.lineTo(mx(seg.x2), my(seg.y2));
          miniCtx.stroke();
        }

        miniCtx.strokeStyle = "rgba(80,220,255,0.95)";
        for (const sp of spinners) {
          const half = sp.length * 0.5;
          const cos = Math.cos(sp.angle);
          const sin = Math.sin(sp.angle);
          miniCtx.beginPath();
          miniCtx.moveTo(mx(sp.x - cos * half), my(sp.y - sin * half));
          miniCtx.lineTo(mx(sp.x + cos * half), my(sp.y + sin * half));
          miniCtx.stroke();
        }

        miniCtx.strokeStyle = "rgba(80,220,255,0.9)";
        for (const lp of launchPads) {
          miniCtx.beginPath();
          miniCtx.arc(mx(lp.x), my(lp.y), Math.max(2, lp.r * scale), 0, Math.PI * 2);
          miniCtx.stroke();
        }

        miniCtx.fillStyle = "rgba(60,220,255,0.8)";
        for (const peg of pegs) {
          miniCtx.beginPath();
          miniCtx.arc(mx(peg.x), my(peg.y), Math.max(0.8, peg.r * scale), 0, Math.PI * 2);
          miniCtx.fill();
        }

        for (const ball of balls) {
          miniCtx.beginPath();
          miniCtx.fillStyle = ball.finished ? "#ffffff" : "#d0d0d0";
          miniCtx.arc(mx(ball.x), my(ball.y), Math.max(1.0, ball.r * scale), 0, Math.PI * 2);
          miniCtx.fill();
        }

        const viewWorldW = scene.width / camera.zoom;
        const viewWorldH = scene.height / camera.zoom;
        const vx = camera.x - viewWorldW / 2;
        const vy = camera.y - viewWorldH / 2;

        miniCtx.strokeStyle = "rgba(255,255,255,0.95)";
        miniCtx.lineWidth = 1.2;
        miniCtx.strokeRect(mx(vx), my(vy), viewWorldW * scale, viewWorldH * scale);
      }

      function gameLoop(now) {
        if (!lastTime) lastTime = now;
        let dt = (now - lastTime) / 1000;
        lastTime = now;
        dt = Math.min(dt, MAX_DT);
        accumulator += dt;

        while (accumulator >= FIXED_DT) {
          stepPhysics(FIXED_DT, now);
          accumulator -= FIXED_DT;
        }

        updateCamera(now);
        drawMainScene(now);
        drawMiniMap();
        requestAnimationFrame(gameLoop);
      }

      shuffleBtn.addEventListener("click", doShuffle);
      startBtn.addEventListener("click", startGame);

      namesInput.addEventListener("change", () => {
        shuffledNames = parseNames();
        rebuildGame(true);
      });

      targetInput.addEventListener("change", () => {
        targetRank = Math.max(1, parseInt(targetInput.value || "1", 10));
      });

      window.addEventListener("resize", resize);

      resize();
      shuffledNames = parseNames();
      rebuildGame(true);
      updateRankBoard();
      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
