<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>한국 중심 세계지도</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1f4d;
      touch-action: none;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    #map {
      width: 100vw;
      height: 100vh;
      background: #0b1f4d;
      cursor: grab;
      position: relative;
      overflow: hidden;
    }

    #map:active {
      cursor: grabbing;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      background: #0b1f4d;
    }

    .land {
      fill: #e7d8b4;
      stroke: #4f4330;
      stroke-width: 0.6;
      vector-effect: non-scaling-stroke;
    }

    .country-label {
      fill: #2e261b;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      user-select: none;
      paint-order: stroke;
      stroke: rgba(245, 239, 224, 0.95);
      stroke-width: 2.6px;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 20px;
      background: #0b1f4d;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #ffd6d6;
    }
  </style>
</head>
<body>
  <div id="map">
    <div id="loading" class="loading">지도를 불러오는 중...</div>
    <svg id="svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
      <g id="viewport">
        <rect x="-5000" y="-5000" width="10000" height="10000" fill="#0b1f4d"></rect>

        <g id="world">
          <rect x="0" y="0" width="1600" height="900" fill="#0b1f4d"></rect>
          <g id="countries"></g>
          <g id="labels"></g>
        </g>
      </g>
    </svg>
  </div>

  <script>
    const svg = document.getElementById("svg");
    const world = document.getElementById("world");
    const countriesGroup = document.getElementById("countries");
    const labelsGroup = document.getElementById("labels");
    const loading = document.getElementById("loading");

    const VIEW_W = 1600;
    const VIEW_H = 900;
    const WORLD_W = 1600;
    const WORLD_H = 900;

    let scale = 1;
    let minScale = 1;
    const maxScale = 60;
    let translateX = 0;
    let translateY = 0;

    let isDragging = false;
    let lastX = 0;
    let lastY = 0;

    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let pinchStartTX = 0;
    let pinchStartTY = 0;
    let pinchCenter = null;

    const labelItems = [];
    const regionNames = new Intl.DisplayNames(["ko"], { type: "region" });

    const nameOverrides = {
      XK: "코소보",
      PS: "팔레스타인",
      TW: "대만",
      VA: "바티칸",
      CZ: "체코",
      SZ: "에스와티니",
      TL: "동티모르",
      MM: "미얀마",
      LA: "라오스",
      MD: "몰도바",
      RU: "러시아",
      KR: "대한민국",
      KP: "조선민주주의인민공화국",
      US: "미국",
      GB: "영국",
      AE: "아랍에미리트",
      CD: "콩고 민주 공화국",
      CG: "콩고 공화국",
      CI: "코트디부아르",
      SY: "시리아",
      IR: "이란",
      TZ: "탄자니아",
      VN: "베트남",
      BO: "볼리비아",
      VE: "베네수엘라",
      BN: "브루나이",
      FM: "미크로네시아",
      CV: "카보베르데",
      ST: "상투메 프린시페",
      GQ: "적도 기니",
      CF: "중앙아프리카공화국",
      DO: "도미니카 공화국",
      SS: "남수단"
    };

    function project(lon, lat) {
      const x = ((lon + 180) / 360) * WORLD_W;
      const y = ((90 - lat) / 180) * WORLD_H;
      return [x, y];
    }

    function normalizeLon180(lon) {
      let v = lon;
      while (v < -180) v += 360;
      while (v > 180) v -= 360;
      return v;
    }

    function splitRingAtDateline(ring) {
      if (!ring || ring.length < 2) return [ring];

      const segments = [];
      let current = [ring[0]];

      for (let i = 1; i < ring.length; i++) {
        const prev = ring[i - 1];
        const curr = ring[i];

        const prevLon = normalizeLon180(prev[0]);
        const currLon = normalizeLon180(curr[0]);
        const jump = Math.abs(currLon - prevLon);

        if (jump > 180) {
          if (current.length >= 3) segments.push(current);
          current = [curr];
        } else {
          current.push(curr);
        }
      }

      if (current.length >= 3) segments.push(current);
      return segments;
    }

    function buildPathFromRing(ring) {
      if (!ring || !ring.length) return "";

      let d = "";
      for (let i = 0; i < ring.length; i++) {
        const [lon, lat] = ring[i];
        const [x, y] = project(lon, lat);
        d += (i === 0 ? "M" : "L") + x + " " + y + " ";
      }
      d += "Z ";
      return d;
    }

    function geometryToPath(geometry) {
      let d = "";

      if (geometry.type === "Polygon") {
        for (const ring of geometry.coordinates) {
          const pieces = splitRingAtDateline(ring);
          for (const piece of pieces) d += buildPathFromRing(piece);
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          for (const ring of polygon) {
            const pieces = splitRingAtDateline(ring);
            for (const piece of pieces) d += buildPathFromRing(piece);
          }
        }
      }

      return d;
    }

    function polygonArea(points) {
      let area = 0;
      const n = points.length;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = points[i];
        const [x2, y2] = points[(i + 1) % n];
        area += x1 * y2 - x2 * y1;
      }
      return Math.abs(area) * 0.5;
    }

    function getGeometryProjectedPieces(geometry) {
      const out = [];

      if (geometry.type === "Polygon") {
        for (const ring of geometry.coordinates) {
          const pieces = splitRingAtDateline(ring);
          for (const piece of pieces) {
            out.push(piece.map(([lon, lat]) => project(lon, lat)));
          }
        }
      } else if (geometry.type === "MultiPolygon") {
        for (const polygon of geometry.coordinates) {
          for (const ring of polygon) {
            const pieces = splitRingAtDateline(ring);
            for (const piece of pieces) {
              out.push(piece.map(([lon, lat]) => project(lon, lat)));
            }
          }
        }
      }

      return out.filter(piece => piece.length >= 3);
    }

    function getLabelPlacement(geometry) {
      const pieces = getGeometryProjectedPieces(geometry);
      if (!pieces.length) return null;

      let bestPiece = pieces[0];
      let bestArea = polygonArea(bestPiece);

      for (let i = 1; i < pieces.length; i++) {
        const area = polygonArea(pieces[i]);
        if (area > bestArea) {
          bestArea = area;
          bestPiece = pieces[i];
        }
      }

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const [x, y] of bestPiece) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }

      return {
        x: (minX + maxX) / 2,
        y: (minY + maxY) / 2,
        width: maxX - minX,
        height: maxY - minY,
        area: bestArea
      };
    }

    function chooseLabelZoom(area, width, height, name) {
      const len = (name || "").length;

      if (area > 12000 && width > 65 && height > 18) return 1.0;
      if (area > 6000 && width > 45 && height > 14) return 1.25;
      if (area > 2500 && width > 28 && height > 10) return 1.7;
      if (area > 900 && width > 18 && height > 8) return 2.2;
      if (area > 300 && width > 10 && height > 6) return 3.0;
      if (area > 120) return 4.3;
      if (area > 45) return 6.2;
      if (len <= 5) return 8.0;
      if (len <= 10) return 10.0;
      return 12.0;
    }

    function chooseFontSize(area, width, height, name) {
      const estimated = Math.max(8, Math.min(26, Math.sqrt(area) * 0.16));
      const widthLimited = Math.max(7, Math.min(estimated, width / Math.max(1.8, name.length * 0.55)));
      const heightLimited = Math.max(7, Math.min(widthLimited, height * 0.78));
      return Math.max(7, Math.min(26, heightLimited));
    }

    function getCountryCode(feature) {
      const p = feature.properties || {};
      const candidates = [
        p["ISO3166-1-Alpha-2"],
        p.iso_a2,
        p.ISO_A2,
        p.ISO2,
        p.iso2,
        p["iso2"],
        p["WB_A2"],
        p["ADM0_A3_US"],
        p["GU_A3"],
        p["SU_A3"]
      ];

      for (const code of candidates) {
        if (typeof code === "string") {
          const c = code.trim().toUpperCase();
          if (/^[A-Z]{2}$/.test(c)) return c;
        }
      }

      return null;
    }

    function getEnglishCountryName(feature) {
      const p = feature.properties || {};
      return (
        p.ADMIN ||
        p.admin ||
        p.NAME ||
        p.name ||
        p.SOVEREIGNT ||
        p.sovereignt ||
        p.BRK_NAME ||
        p.brk_name ||
        "이름없음"
      );
    }

    function getCountryNameKo(feature) {
      const code = getCountryCode(feature);
      if (code) {
        if (nameOverrides[code]) return nameOverrides[code];
        try {
          const ko = regionNames.of(code);
          if (ko && ko !== code) return ko;
        } catch (e) {}
      }
      return getEnglishCountryName(feature);
    }

    function clampTranslate() {
      const scaledW = WORLD_W * scale;
      const scaledH = WORLD_H * scale;

      if (scaledW <= VIEW_W) {
        translateX = (VIEW_W - scaledW) / 2;
      } else {
        const minX = VIEW_W - scaledW;
        const maxX = 0;
        if (translateX < minX) translateX = minX;
        if (translateX > maxX) translateX = maxX;
      }

      if (scaledH <= VIEW_H) {
        translateY = (VIEW_H - scaledH) / 2;
      } else {
        const minY = VIEW_H - scaledH;
        const maxY = 0;
        if (translateY < minY) translateY = minY;
        if (translateY > maxY) translateY = maxY;
      }
    }

    function setTransform() {
      clampTranslate();
      world.setAttribute("transform", `translate(${translateX} ${translateY}) scale(${scale})`);
      updateLabelsVisibility();
    }

    function updateLabelsVisibility() {
      for (const item of labelItems) {
        item.el.style.display = scale >= item.minZoom ? "" : "none";
      }
    }

    function zoomAt(clientX, clientY, factor) {
      const rect = svg.getBoundingClientRect();
      const px = ((clientX - rect.left) / rect.width) * VIEW_W;
      const py = ((clientY - rect.top) / rect.height) * VIEW_H;

      const newScale = Math.max(minScale, Math.min(maxScale, scale * factor));
      const actualFactor = newScale / scale;
      if (actualFactor === 1) return;

      translateX = px - (px - translateX) * actualFactor;
      translateY = py - (py - translateY) * actualFactor;
      scale = newScale;
      setTransform();
    }

    function getTouchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchCenter(t1, t2) {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    }

    svg.addEventListener("wheel", (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.22 : 1 / 1.22;
      zoomAt(e.clientX, e.clientY, factor);
    }, { passive: false });

    svg.addEventListener("pointerdown", (e) => {
      if (e.pointerType !== "mouse" || e.button === 0) {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        svg.setPointerCapture(e.pointerId);
      }
    });

    svg.addEventListener("pointermove", (e) => {
      if (!isDragging) return;

      const rect = svg.getBoundingClientRect();
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;

      lastX = e.clientX;
      lastY = e.clientY;

      translateX += dx * (VIEW_W / rect.width);
      translateY += dy * (VIEW_H / rect.height);
      setTransform();
    });

    function endDrag() {
      isDragging = false;
    }

    svg.addEventListener("pointerup", endDrag);
    svg.addEventListener("pointercancel", endDrag);
    svg.addEventListener("pointerleave", endDrag);

    svg.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        pinchStartDist = getTouchDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
        pinchStartTX = translateX;
        pinchStartTY = translateY;
        pinchCenter = getTouchCenter(e.touches[0], e.touches[1]);
      }
    }, { passive: false });

    svg.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const dist = getTouchDistance(e.touches[0], e.touches[1]);
        const center = getTouchCenter(e.touches[0], e.touches[1]);
        const factor = dist / pinchStartDist;

        const rect = svg.getBoundingClientRect();
        const px = ((center.x - rect.left) / rect.width) * VIEW_W;
        const py = ((center.y - rect.top) / rect.height) * VIEW_H;

        const newScale = Math.max(minScale, Math.min(maxScale, pinchStartScale * factor));
        const actualFactor = newScale / pinchStartScale;

        translateX = px - (px - pinchStartTX) * actualFactor;
        translateY = py - (py - pinchStartTY) * actualFactor;

        if (pinchCenter) {
          const prevPx = ((pinchCenter.x - rect.left) / rect.width) * VIEW_W;
          const prevPy = ((pinchCenter.y - rect.top) / rect.height) * VIEW_H;
          translateX += px - prevPx;
          translateY += py - prevPy;
        }

        scale = newScale;
        pinchCenter = center;
        setTransform();
      }
    }, { passive: false });

    function centerOnKorea(initialScale) {
      const koreaLon = 127.7669;
      const koreaLat = 35.9078;
      const [kx, ky] = project(koreaLon, koreaLat);

      scale = Math.max(minScale, Math.min(maxScale, initialScale));
      translateX = VIEW_W / 2 - kx * scale;
      translateY = VIEW_H / 2 - ky * scale;
      setTransform();
    }

    async function loadWorld() {
      try {
        const res = await fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson");
        const geojson = await res.json();

        for (const feature of geojson.features) {
          const geometry = feature.geometry;
          if (!geometry) continue;

          const d = geometryToPath(geometry);
          if (!d) continue;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("class", "land");
          countriesGroup.appendChild(path);

          const labelPos = getLabelPlacement(geometry);
          if (!labelPos) continue;

          const name = getCountryNameKo(feature);
          const fontSize = chooseFontSize(labelPos.area, labelPos.width, labelPos.height, name);
          const minZoomForLabel = chooseLabelZoom(labelPos.area, labelPos.width, labelPos.height, name);

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", labelPos.x);
          text.setAttribute("y", labelPos.y);
          text.setAttribute("class", "country-label");
          text.setAttribute("font-size", fontSize.toFixed(1));
          text.textContent = name;

          labelsGroup.appendChild(text);
          labelItems.push({
            el: text,
            minZoom: minZoomForLabel
          });
        }

        loading.classList.add("hidden");

        minScale = 1;
        centerOnKorea(2.2);
      } catch (err) {
        loading.textContent = "지도 데이터를 불러오지 못했습니다.";
        loading.classList.add("error");
        console.error(err);
      }
    }

    loadWorld();
  </script>
</body>
</html>
