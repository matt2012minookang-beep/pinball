<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뽑기게임</title>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <style>
    :root{
      --bg:#000;
      --panel:rgba(150,150,150,0.22);
      --panel-border:rgba(255,255,255,0.25);
      --text:#f5f5f5;
      --muted:#cfcfcf;
      --wall:#f3f3f3;
      --inner:#101010;
      --glow:rgba(255,255,255,0.25);
      --danger:#ffffff;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:var(--text);
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    }
    body{
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.04), transparent 30%),
        radial-gradient(circle at 20% 40%, rgba(255,255,255,0.015), transparent 25%),
        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.015), transparent 25%),
        #000;
    }
    #app{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }
    #scene{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.06), transparent 16%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
        #030303;
    }
    .glass{
      background:var(--panel);
      border:1px solid var(--panel-border);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.06),
        0 0 30px rgba(255,255,255,0.08);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      border-radius:18px;
    }
    #leftUI{
      position:absolute;
      left:18px;
      top:18px;
      bottom:18px;
      width:320px;
      z-index:20;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    #miniWrap{
      padding:14px;
      height:245px;
      flex:0 0 auto;
    }
    #miniTitle{
      font-size:15px;
      font-weight:800;
      margin-bottom:10px;
      letter-spacing:-0.3px;
    }
    #miniMap{
      width:100%;
      height:185px;
      display:block;
      background:#090909;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 0 18px rgba(255,255,255,0.05);
    }
    #controlWrap{
      padding:14px;
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
    }
    .label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }
    textarea, input{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      padding:12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      font-size:15px;
    }
    textarea{
      resize:none;
      height:160px;
      line-height:1.45;
    }
    input{
      height:44px;
    }
    .row{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    button{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:14px;
      color:#fff;
      font-weight:900;
      background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 8px 20px rgba(0,0,0,0.28),
        0 0 18px rgba(255,255,255,0.08);
      transition:transform .08s ease, filter .12s ease;
    }
    button:hover{ filter:brightness(1.08); }
    button:active{ transform:translateY(1px); }
    #shuffleBtn{
      height:58px;
      font-size:28px;
      letter-spacing:-1px;
    }
    #startBtn{
      height:72px;
      font-size:34px;
      letter-spacing:-1.5px;
    }
    #infoText{
      font-size:12px;
      color:#d8d8d8;
      line-height:1.45;
      opacity:0.92;
      white-space:pre-line;
    }
    #rankBoard{
      position:absolute;
      right:18px;
      top:18px;
      z-index:20;
      min-width:200px;
      max-width:260px;
      padding:14px 16px;
      font-size:18px;
      line-height:1.6;
      font-weight:800;
    }
    #rankBoard .title{
      font-size:20px;
      margin-bottom:6px;
      color:#fff;
    }
    #winnerBanner{
      position:absolute;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      z-index:20;
      padding:14px 24px;
      border-radius:999px;
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.28);
      box-shadow:0 0 28px rgba(255,255,255,0.18);
      font-size:38px;
      font-weight:900;
      letter-spacing:-1px;
      opacity:0;
      transition:opacity .2s ease;
      pointer-events:none;
      text-shadow:0 0 16px rgba(255,255,255,0.45);
    }
    #winnerBanner.show{ opacity:1; }
    #statusBar{
      position:absolute;
      left:356px;
      bottom:18px;
      z-index:20;
      padding:10px 14px;
      font-size:13px;
      color:#efefef;
      max-width:500px;
    }
    @media (max-width: 900px){
      #leftUI{ width:280px; }
      #statusBar{ left:18px; bottom:18px; max-width:calc(100vw - 36px); }
      #rankBoard{ font-size:15px; min-width:170px; }
      #winnerBanner{ font-size:28px; }
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div id="leftUI">
    <div id="miniWrap" class="glass">
      <div id="miniTitle">전체 맵</div>
      <canvas id="miniMap" width="292" height="185"></canvas>
    </div>

    <div id="controlWrap" class="glass">
      <div>
        <div class="label">이름 입력 (쉼표로 구분, 중복 가능)</div>
        <textarea id="namesInput">지,원,민수,지,은지,승호,수지,원,민수,하람,지우,지훈,은지,도윤,예린</textarea>
      </div>

      <div>
        <div class="label">몇 번째가 당첨인지</div>
        <input id="targetInput" type="number" min="1" value="10" />
      </div>

      <button id="shuffleBtn">셔플</button>
      <button id="startBtn">시작</button>

      <div id="infoText">시작 전에는 공이 공중에 떠 있습니다.
시작하면 중력, 관성, 충돌, 작용/반작용이 적용됩니다.
카메라는 가장 앞선 공을 따라갑니다.
왼쪽 위 전체 맵으로 전 상황을 볼 수 있습니다.</div>
    </div>
  </div>

  <div id="rankBoard" class="glass">
    <div class="title">현재 순위</div>
    <div id="rankText">아직 시작 전</div>
  </div>

  <div id="winnerBanner"></div>

  <div id="statusBar" class="glass">대기 중</div>
</div>

<script>
(() => {
  const {
    Engine, World, Bodies, Body, Composite, Runner, Events, Vector
  } = Matter;

  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');

  const miniCanvas = document.getElementById('miniMap');
  const miniCtx = miniCanvas.getContext('2d');

  const namesInput = document.getElementById('namesInput');
  const targetInput = document.getElementById('targetInput');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const startBtn = document.getElementById('startBtn');
  const rankText = document.getElementById('rankText');
  const winnerBanner = document.getElementById('winnerBanner');
  const statusBar = document.getElementById('statusBar');

  let W = window.innerWidth;
  let H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  const engine = Engine.create({
    gravity: { x: 0, y: 1.08, scale: 0.00165 }
  });
  const world = engine.world;
  const runner = Runner.create();

  const WORLD = {
    x: 0,
    y: 0,
    width: 5400,
    height: 26000
  };

  const camera = {
    x: WORLD.width / 2,
    y: 1400,
    zoom: 0.38,
    smooth: 0.065
  };

  const walls = [];
  const pegs = [];
  const paddles = [];
  const sensors = [];
  const finishGateBodies = [];

  let balls = [];
  let rankings = [];
  let started = false;
  let winnerInfo = null;
  let shuffledNames = [];
  let targetRank = 10;

  const ballColors = [
    "#f5f5f5","#dddddd","#cacaca","#b6b6b6","#ffffff",
    "#e9e9e9","#d4d4d4","#c2c2c2","#f0f0f0","#aeaeae"
  ];

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  }
  window.addEventListener('resize', resize);

  function clearWorld(){
    const allBodies = Composite.allBodies(world);
    for (const body of allBodies) {
      World.remove(world, body);
    }
    walls.length = 0;
    pegs.length = 0;
    paddles.length = 0;
    sensors.length = 0;
    finishGateBodies.length = 0;
    balls.length = 0;
    rankings.length = 0;
    winnerInfo = null;
    winnerBanner.classList.remove("show");
    winnerBanner.textContent = "";
  }

  function wall(x1, y1, x2, y2, thickness = 28, opt = {}) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx);
    const body = Bodies.rectangle((x1+x2)/2, (y1+y2)/2, len, thickness, {
      isStatic: true,
      restitution: 0.15,
      friction: 0.15,
      renderType: "wall",
      chamfer: { radius: Math.min(10, thickness/2) },
      ...opt
    });
    Body.rotate(body, ang);
    body._p1 = {x:x1, y:y1};
    body._p2 = {x:x2, y:y2};
    walls.push(body);
    World.add(world, body);
    return body;
  }

  function peg(x, y, r = 24) {
    const body = Bodies.circle(x, y, r, {
      isStatic: true,
      restitution: 0.85,
      friction: 0.01,
      renderType: "peg"
    });
    pegs.push(body);
    World.add(world, body);
    return body;
  }

  function spinner(x, y, length = 260, thickness = 20, speed = 0.03) {
    const body = Bodies.rectangle(x, y, length, thickness, {
      isStatic: true,
      restitution: 0.7,
      friction: 0.02,
      renderType: "paddle"
    });
    body.spinSpeed = speed;
    paddles.push(body);
    World.add(world, body);
    return body;
  }

  function sensorRect(x, y, w, h, label) {
    const s = Bodies.rectangle(x, y, w, h, {
      isStatic: true,
      isSensor: true,
      renderType: "sensor"
    });
    s.sensorLabel = label;
    sensors.push(s);
    World.add(world, s);
    return s;
  }

  function makeMap(){
    clearWorld();

    // Outer bright chamber
    wall(700, 200, 700, WORLD.height - 800, 44);
    wall(WORLD.width - 700, 200, WORLD.width - 700, WORLD.height - 800, 44);
    wall(700, 200, WORLD.width - 700, 200, 44);

    // slightly glowing inner boundaries
    wall(880, 650, WORLD.width - 880, 650, 22);

    // Floating start rail
    wall(1000, 1000, WORLD.width - 1000, 1000, 18);
    wall(1150, 1120, 1600, 1320, 18);
    wall(WORLD.width - 1150, 1120, WORLD.width - 1600, 1320, 18);

    // Giant course
    wall(900, 1800, 2800, 2200, 28);
    wall(3100, 2400, 4450, 2050, 28);
    wall(1450, 2900, 2350, 3600, 28);
    wall(3900, 3150, 3000, 3800, 28);
    wall(1200, 4300, 2800, 4580, 30);
    wall(3200, 4460, 4300, 4200, 30);
    wall(1450, 5300, 2300, 5950, 26);
    wall(3950, 5200, 3150, 6100, 26);

    wall(900, 6800, 2400, 7200, 30);
    wall(2950, 7000, 4500, 6550, 30);
    wall(1400, 8150, 3050, 8500, 30);
    wall(4050, 8320, 2550, 9000, 30);
    wall(1250, 9750, 2200, 10350, 28);
    wall(3150, 10100, 4300, 9600, 28);

    wall(850, 11300, 2850, 11620, 30);
    wall(3250, 11680, 4500, 11150, 30);
    wall(1200, 12750, 2550, 13450, 28);
    wall(4000, 12800, 3100, 13750, 28);

    wall(920, 14550, 2300, 14920, 30);
    wall(2720, 15150, 4450, 14750, 30);
    wall(1300, 15980, 2950, 16650, 28);
    wall(4200, 16150, 2750, 17050, 28);

    wall(860, 17700, 2700, 18120, 30);
    wall(3040, 18180, 4480, 17650, 30);
    wall(1200, 19180, 2350, 19880, 28);
    wall(3850, 19220, 3050, 20250, 28);

    wall(900, 20900, 2920, 21220, 30);
    wall(3300, 21330, 4500, 20850, 30);
    wall(1400, 22150, 3000, 22980, 28);
    wall(4150, 22350, 2500, 23500, 28);

    // funnels
    wall(1800, 4800, 2200, 5200, 26);
    wall(2600, 4800, 2200, 5200, 26);
    wall(3400, 7600, 3000, 8000, 26);
    wall(2600, 7600, 3000, 8000, 26);
    wall(1800, 12000, 2250, 12420, 26);
    wall(2700, 12000, 2250, 12420, 26);
    wall(3550, 17350, 3120, 17820, 26);
    wall(2680, 17350, 3120, 17820, 26);

    // one-ball narrow gates
    wall(1950, 5200, 1950, 5600, 16);
    wall(2450, 5200, 2450, 5600, 16);

    wall(2780, 8000, 2780, 8380, 16);
    wall(3220, 8000, 3220, 8380, 16);

    wall(2030, 12400, 2030, 12830, 16);
    wall(2470, 12400, 2470, 12830, 16);

    // pegs
    const pegZones = [
      { y1: 1700, y2: 4300, cols: 11 },
      { y1: 4700, y2: 10300, cols: 12 },
      { y1: 10800, y2: 17000, cols: 13 },
      { y1: 17500, y2: 23400, cols: 12 }
    ];

    for (const zone of pegZones) {
      const stepY = 520;
      let row = 0;
      for (let y = zone.y1; y <= zone.y2; y += stepY) {
        const cols = zone.cols;
        const margin = 980;
        const usable = WORLD.width - margin*2;
        const stepX = usable / (cols-1);
        const offset = (row % 2) * (stepX/2);
        for (let i = 0; i < cols; i++) {
          const x = margin + i*stepX + offset;
          if (x > 900 && x < WORLD.width - 900) peg(x, y, 22 + ((i+row)%3)*2);
        }
        row++;
      }
    }

    // spinners / moving obstacles
    spinner(2850, 2550, 340, 22, 0.028);
    spinner(3800, 6200, 320, 20, -0.032);
    spinner(2100, 9300, 360, 22, 0.030);
    spinner(3200, 13900, 340, 22, -0.027);
    spinner(1900, 18650, 320, 20, 0.03);
    spinner(3600, 21650, 380, 22, -0.031);

    // final approach
    wall(1000, 23850, 2000, 24150, 28);
    wall(2200, 24250, 3200, 24550, 28);
    wall(3400, 24650, 4400, 24950, 28);

    // finish lane walls (single file)
    wall(2500, 23820, 2500, WORLD.height - 1000, 22);
    wall(2900, 23820, 2900, WORLD.height - 1000, 22);
    wall(2500, WORLD.height - 1000, 2900, WORLD.height - 1000, 28);

    // finish trigger
    sensorRect(2700, WORLD.height - 1250, 300, 120, "finish");

    // invisible side bounds near bottom to prevent escape
    wall(700, WORLD.height - 850, 2200, WORLD.height - 850, 30, { renderType: "hidden" });
    wall(3200, WORLD.height - 850, WORLD.width - 700, WORLD.height - 850, 30, { renderType: "hidden" });
  }

  function parseNames() {
    return namesInput.value
      .split(",")
      .map(s => s.trim())
      .filter(Boolean);
  }

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildBalls(names) {
    const startY = 560;
    const gap = 170;
    const totalWidth = (names.length - 1) * gap;
    const startX = WORLD.width/2 - totalWidth/2;

    balls = names.map((name, i) => {
      const r = 56;
      const body = Bodies.circle(startX + i*gap, startY, r, {
        restitution: 0.56,
        friction: 0.01,
        frictionAir: 0.0006,
        density: 0.0022,
        isStatic: true,
        renderType: "ball"
      });
      body.ballName = name;
      body.ballColor = ballColors[i % ballColors.length];
      body.finished = false;
      body.finishOrder = null;
      body.spawnIndex = i;
      World.add(world, body);
      return body;
    });
  }

  function rebuildGame(keepShuffle = true) {
    targetRank = Math.max(1, parseInt(targetInput.value || "1", 10));
    const names = parseNames();
    const source = keepShuffle && shuffledNames.length === names.length ? shuffledNames : names;
    shuffledNames = [...source];
    started = false;
    rankings = [];
    statusBar.textContent = "대기 중";
    rankText.textContent = "아직 시작 전";
    makeMap();
    buildBalls(shuffledNames);
    camera.x = WORLD.width / 2;
    camera.y = 1400;
    camera.zoom = 0.38;
  }

  function doShuffle() {
    const names = parseNames();
    shuffledNames = shuffleArray(names);
    rebuildGame(true);
    statusBar.textContent = "셔플 완료";
  }

  function startGame() {
    if (started) return;
    if (!balls.length) rebuildGame(true);
    started = true;
    statusBar.textContent = "시작! 가장 앞선 공을 따라갑니다.";
    for (const b of balls) {
      Body.setStatic(b, false);
      Body.setVelocity(b, {
        x: (Math.random() - 0.5) * 1.0,
        y: 0.1 + Math.random() * 0.15
      });
      Body.setAngularVelocity(b, (Math.random() - 0.5) * 0.04);
    }
  }

  shuffleBtn.addEventListener("click", doShuffle);
  startBtn.addEventListener("click", startGame);

  targetInput.addEventListener("change", () => {
    targetRank = Math.max(1, parseInt(targetInput.value || "1", 10));
    if (winnerInfo) updateWinnerBanner();
  });

  namesInput.addEventListener("change", () => {
    shuffledNames = parseNames();
    rebuildGame(true);
  });

  function findLeaderBall() {
    let leader = null;
    let maxY = -Infinity;
    for (const b of balls) {
      if (b.position.y > maxY && !b.finished) {
        maxY = b.position.y;
        leader = b;
      }
    }
    if (!leader) {
      leader = balls.find(b => b.finished) || balls[0] || null;
    }
    return leader;
  }

  function updateCamera() {
    const leader = findLeaderBall();
    if (!leader) return;

    const targetX = leader.position.x;
    const targetY = leader.position.y;

    camera.x += (targetX - camera.x) * camera.smooth;
    camera.y += (targetY - camera.y) * camera.smooth;

    const minX = 1200;
    const maxX = WORLD.width - 1200;
    const halfViewW = W / camera.zoom / 2;
    const halfViewH = H / camera.zoom / 2;

    camera.x = Math.max(minX, Math.min(maxX, camera.x));
    camera.y = Math.max(halfViewH + 100, Math.min(WORLD.height - halfViewH - 100, camera.y));
  }

  function updatePaddles() {
    for (const p of paddles) {
      Body.rotate(p, p.spinSpeed);
    }
  }

  function updateRankBoard() {
    if (!rankings.length) {
      rankText.innerHTML = started ? "아직 통과한 공 없음" : "아직 시작 전";
      return;
    }
    const top = rankings.slice(0, 15);
    rankText.innerHTML = top.map((b, i) => `${i+1}등: ${escapeHtml(b.ballName)}`).join("<br>");
  }

  function updateWinnerBanner() {
    if (!winnerInfo) return;
    winnerBanner.textContent = `${winnerInfo.rank}번째 통과 - ${winnerInfo.name} win!`;
    winnerBanner.classList.add("show");
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  Events.on(engine, "collisionStart", (evt) => {
    for (const pair of evt.pairs) {
      const a = pair.bodyA;
      const b = pair.bodyB;
      handleSensorCollision(a, b);
      handleSensorCollision(b, a);
    }
  });

  function handleSensorCollision(sensor, other) {
    if (!sensor.isSensor || sensor.sensorLabel !== "finish") return;
    if (!other.ballName || other.finished) return;

    other.finished = true;
    other.finishOrder = rankings.length + 1;
    rankings.push(other);

    // slightly settle in winner lane
    Body.setVelocity(other, { x: 0, y: Math.min(other.velocity.y, 2.2) });

    if (!winnerInfo && other.finishOrder === targetRank) {
      winnerInfo = {
        rank: other.finishOrder,
        name: other.ballName
      };
      updateWinnerBanner();
      statusBar.textContent = `${other.finishOrder}번째 통과 당첨: ${other.ballName}`;
    } else {
      statusBar.textContent = `${other.finishOrder}등 통과: ${other.ballName}`;
    }

    updateRankBoard();
  }

  function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  function worldToScreen(x, y) {
    return {
      x: (x - camera.x) * camera.zoom + W/2,
      y: (y - camera.y) * camera.zoom + H/2
    };
  }

  function drawBackgroundWorld() {
    const topGlow = worldToScreen(WORLD.width/2, 0);
    const grad = ctx.createRadialGradient(topGlow.x, 120, 50, topGlow.x, 120, H*0.8);
    grad.addColorStop(0, "rgba(255,255,255,0.05)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawWallBody(body) {
    if (body.renderType === "hidden") return;
    const verts = body.vertices.map(v => worldToScreen(v.x, v.y));
    ctx.beginPath();
    ctx.moveTo(verts[0].x, verts[0].y);
    for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
    ctx.closePath();

    const glow = ctx.createLinearGradient(verts[0].x, verts[0].y, verts[2].x, verts[2].y);
    glow.addColorStop(0, "rgba(255,255,255,0.98)");
    glow.addColorStop(1, "rgba(220,220,220,0.82)");

    ctx.fillStyle = glow;
    ctx.shadowColor = "rgba(255,255,255,0.22)";
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawPegBody(body) {
    const p = worldToScreen(body.position.x, body.position.y);
    const r = body.circleRadius * camera.zoom;
    if (r < 1.5) return;

    const g = ctx.createRadialGradient(p.x - r*0.3, p.y - r*0.4, r*0.1, p.x, p.y, r);
    g.addColorStop(0, "#ffffff");
    g.addColorStop(0.45, "#d7d7d7");
    g.addColorStop(1, "#8d8d8d");

    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.shadowColor = "rgba(255,255,255,0.15)";
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBall(body) {
    const p = worldToScreen(body.position.x, body.position.y);
    const r = body.circleRadius * camera.zoom;
    if (p.x < -r*2 || p.x > W+r*2 || p.y < -r*2 || p.y > H+r*2) return;

    const g = ctx.createRadialGradient(p.x - r*0.35, p.y - r*0.45, r*0.12, p.x, p.y, r);
    g.addColorStop(0, "#ffffff");
    g.addColorStop(0.48, body.ballColor);
    g.addColorStop(1, "#777777");

    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.shadowColor = "rgba(255,255,255,0.18)";
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = Math.max(1, r*0.08);
    ctx.stroke();

    const angle = body.angle;
    ctx.translate(p.x, p.y);
    ctx.rotate(angle);
    ctx.fillStyle = "#111";
    ctx.font = `900 ${Math.max(10, r*0.42)}px Malgun Gothic, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    let label = body.ballName;
    if (label.length > 3) label = label.slice(0, 3);
    ctx.fillText(label, 0, 0);
    ctx.restore();

    if (body.finished) {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.lineWidth = Math.max(2, r*0.1);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 5, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawPaddle(body) {
    drawWallBody(body);
  }

  function drawMainScene() {
    ctx.clearRect(0, 0, W, H);
    drawBackgroundWorld();

    // world chamber dark fill
    const tl = worldToScreen(700, 200);
    const br = worldToScreen(WORLD.width - 700, WORLD.height - 800);
    ctx.fillStyle = "#121212";
    ctx.fillRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

    for (const body of walls) drawWallBody(body);
    for (const body of pegs) drawPegBody(body);
    for (const body of paddles) drawPaddle(body);
    for (const ball of balls) drawBall(ball);

    // finish gate visual
    const finishX1 = worldToScreen(2500, WORLD.height - 1000);
    const finishX2 = worldToScreen(2900, WORLD.height - 1000);
    const finishTop = worldToScreen(2500, 23820);
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 8]);
    ctx.strokeRect(finishX1.x, finishTop.y, finishX2.x - finishX1.x, finishX1.y - finishTop.y);
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawMiniMap() {
    const mw = miniCanvas.width;
    const mh = miniCanvas.height;
    miniCtx.clearRect(0, 0, mw, mh);

    miniCtx.fillStyle = "#060606";
    miniCtx.fillRect(0, 0, mw, mh);

    const pad = 10;
    const sx = (mw - pad*2) / WORLD.width;
    const sy = (mh - pad*2) / WORLD.height;
    const scale = Math.min(sx, sy);

    function mtx(x){ return pad + x * scale; }
    function mty(y){ return pad + y * scale; }

    miniCtx.fillStyle = "#101010";
    miniCtx.fillRect(mtx(700), mty(200), (WORLD.width - 1400)*scale, (WORLD.height - 1000)*scale);

    miniCtx.strokeStyle = "rgba(255,255,255,0.9)";
    miniCtx.lineWidth = 1.2;
    for (const w of walls) {
      if (w.renderType === "hidden") continue;
      miniCtx.beginPath();
      miniCtx.moveTo(mtx(w._p1.x), mty(w._p1.y));
      miniCtx.lineTo(mtx(w._p2.x), mty(w._p2.y));
      miniCtx.stroke();
    }

    miniCtx.fillStyle = "rgba(255,255,255,0.72)";
    for (const p of pegs) {
      miniCtx.beginPath();
      miniCtx.arc(mtx(p.position.x), mty(p.position.y), Math.max(0.7, p.circleRadius * scale), 0, Math.PI*2);
      miniCtx.fill();
    }

    for (const b of balls) {
      miniCtx.beginPath();
      miniCtx.fillStyle = b.finished ? "#ffffff" : "#cfcfcf";
      miniCtx.arc(mtx(b.position.x), mty(b.position.y), Math.max(1.5, b.circleRadius * scale * 1.2), 0, Math.PI*2);
      miniCtx.fill();
    }

    // current camera view
    const viewW = W / camera.zoom;
    const viewH = H / camera.zoom;
    const vx = camera.x - viewW/2;
    const vy = camera.y - viewH/2;
    miniCtx.strokeStyle = "rgba(255,255,255,0.95)";
    miniCtx.lineWidth = 1.4;
    miniCtx.strokeRect(mtx(vx), mty(vy), viewW*scale, viewH*scale);
  }

  function constrainBalls() {
    for (const b of balls) {
      if (b.position.x < 760) Body.setPosition(b, { x: 760, y: b.position.y });
      if (b.position.x > WORLD.width - 760) Body.setPosition(b, { x: WORLD.width - 760, y: b.position.y });

      if (b.position.y > WORLD.height - 850 && !b.finished) {
        // gently guide toward finish if stuck at bottom outside lane
        const dirX = 2700 - b.position.x;
        Body.applyForce(b, b.position, { x: dirX * 0.0000008, y: -0.000003 });
      }
    }
  }

  function tick() {
    updatePaddles();
    Engine.update(engine, 1000/60);
    constrainBalls();
    updateCamera();
    drawMainScene();
    drawMiniMap();
    requestAnimationFrame(tick);
  }

  // initial
  shuffledNames = parseNames();
  rebuildGame(true);
  Runner.run(runner, engine);
  tick();
  updateRankBoard();
})();
</script>
